<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模板配置 - 招聘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .nav-links {
      margin-top: 15px;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      opacity: 0.9;
    }
    .nav-links a:hover { opacity: 1; text-decoration: underline; }
    .main-content { padding: 30px; }
    .tabs {
      display: flex;
      background: #f8f9ff;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 30px;
    }
    .tab {
      padding: 15px 30px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab:hover { color: #667eea; }
    .tab.active { color: #667eea; border-bottom-color: #667eea; }
    .section { display: none; }
    .section.active { display: block; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }
    .card h3 { margin: 0 0 15px 0; color: #333; font-size: 18px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e0e0e0; }
    .data-table th { background: #f8f9ff; font-weight: 600; color: #333; }
    .data-table tr:hover { background: #f8f9ff; }
    .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
    .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .loading { display: flex; justify-content: center; align-items: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 30px; max-width: 600px; width: 90%; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { margin: 0; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .sort-handle { cursor: grab; color: #999; }
    .sort-handle:active { cursor: grabbing; }
    @media (max-width: 768px) {
      .tabs { flex-direction: column; }
      .tab { border-bottom: 1px solid #e0e0e0; }
      .tab.active { border-bottom-color: #667eea; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>模板配置</h1>
      <p>招聘管理系统</p>
      <div class="nav-links">
        <a href="applications.html">← 返回应聘信息管理</a>
        <a href="settings.html">系统设置 →</a>
      </div>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('apprentice')">学徒/普工模板</div>
      <div class="tab" onclick="switchTab('technician')">牙科技工/质检员模板</div>
    </div>
    
    <div class="main-content">
      <!-- 学徒/普工模板 -->
      <div id="apprentice" class="section active">
        <div class="card">
          <h3>学徒/普工模板字段管理</h3>
          <button class="btn btn-primary" onclick="showAddFieldModal('apprentice')">+ 添加字段</button>
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 50px;">排序</th>
                <th>字段名称</th>
                <th>字段标签</th>
                <th>字段类型</th>
                <th>必填</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="apprenticeFields">
              <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- 牙科技工/质检员模板 -->
      <div id="technician" class="section">
        <div class="card">
          <h3>牙科技工/质检员模板字段管理</h3>
          <button class="btn btn-primary" onclick="showAddFieldModal('technician')">+ 添加字段</button>
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 50px;">排序</th>
                <th>字段名称</th>
                <th>字段标签</th>
                <th>字段类型</th>
                <th>必填</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="technicianFields">
              <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 添加/编辑字段模态框 -->
  <div id="fieldModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="fieldModalTitle">添加字段</h3>
        <button class="modal-close" onclick="closeFieldModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>字段名称</label>
        <input type="text" id="fieldName" placeholder="请输入字段名称，如：education_background">
      </div>
      <div class="form-group">
        <label>字段标签</label>
        <input type="text" id="fieldLabel" placeholder="请输入字段标签，如：教育背景">
      </div>
      <div class="form-group">
        <label>字段类型</label>
        <select id="fieldType">
          <option value="text">文本框</option>
          <option value="textarea">文本域</option>
          <option value="select">下拉选择</option>
          <option value="date">日期选择</option>
        </select>
      </div>
      <div class="form-group">
        <label>是否必填</label>
        <select id="fieldRequired">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>
      <div class="form-group">
        <label>排序</label>
        <input type="number" id="fieldOrder" value="0">
      </div>
      <input type="hidden" id="fieldId">
      <input type="hidden" id="currentTemplate">
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeFieldModal()">取消</button>
        <button class="btn btn-primary" onclick="saveField()">保存</button>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://ztybxgnelynmsgkeqosz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0eWJ4Z25lbHlubXNna2Vxb3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NjAsImV4cCI6MjA4OTg0MzU2MH0.ISKHxvS_1hR5SkluCQ69O6UQNDHMOisPacaRlm0d33M';

    var db = null;

    function loadSDK() {
      var cdnList = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
      ];
      var index = 0;

      function tryLoad() {
        if (index >= cdnList.length) {
          alert('加载Supabase SDK失败');
          return;
        }
        var script = document.createElement('script');
        script.src = cdnList[index];
        script.onload = function() { initApp(); };
        script.onerror = function() { index++; tryLoad(); };
        document.head.appendChild(script);
      }
      tryLoad();
    }

    async function initApp() {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      loadFields('apprentice');
    }

    function switchTab(templateType) {
      var tabs = document.querySelectorAll('.tab');
      var sections = document.querySelectorAll('.section');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        sections[i].classList.remove('active');
      }
      event.target.classList.add('active');
      document.getElementById(templateType).classList.add('active');
      loadFields(templateType);
    }

    async function loadFields(templateType) {
      var tbody = document.getElementById(templateType + 'Fields');
      try {
        var result = await db.from('template_configs').select('*').eq('template_type', templateType).order('sort_order');
        if (result.error) throw result.error;
        
        if (result.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无字段数据</td></tr>';
          return;
        }
        
        var html = '';
        for (var i = 0; i < result.data.length; i++) {
          var field = result.data[i];
          html += '<tr data-id="' + field.id + '" data-order="' + field.sort_order + '">';
          html += '<td><span class="sort-handle" onclick="moveField(' + field.id + ', ' + templateType + ', -1)">↑</span> ' + (i + 1) + ' <span class="sort-handle" onclick="moveField(' + field.id + ', ' + templateType + ', 1)">↓</span></td>';
          html += '<td>' + field.field_name + '</td>';
          html += '<td>' + field.field_label + '</td>';
          html += '<td>' + getFieldTypeLabel(field.field_type) + '</td>';
          html += '<td>' + (field.is_required ? '是' : '否') + '</td>';
          html += '<td>';
          html += '<button class="btn btn-secondary" onclick="editField(' + field.id + ', ' + templateType + ')">编辑</button> ';
          html += '<button class="btn btn-danger" onclick="deleteField(' + field.id + ', ' + templateType + ')">删除</button>';
          html += '</td>';
          html += '</tr>';
        }
        tbody.innerHTML = html;
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:#c62828;">加载失败: ' + e.message + '</td></tr>';
      }
    }

    function getFieldTypeLabel(type) {
      var typeMap = {
        'text': '文本框',
        'textarea': '文本域',
        'select': '下拉选择',
        'date': '日期选择'
      };
      return typeMap[type] || type;
    }

    function showAddFieldModal(templateType) {
      document.getElementById('fieldModalTitle').textContent = '添加字段';
      document.getElementById('fieldId').value = '';
      document.getElementById('fieldName').value = '';
      document.getElementById('fieldLabel').value = '';
      document.getElementById('fieldType').value = 'text';
      document.getElementById('fieldRequired').value = 'false';
      document.getElementById('fieldOrder').value = '0';
      document.getElementById('currentTemplate').value = templateType;
      document.getElementById('fieldModal').classList.add('show');
    }

    async function editField(id, templateType) {
      try {
        var result = await db.from('template_configs').select('*').eq('id', id).single();
        if (result.error) throw result.error;
        
        var field = result.data;
        document.getElementById('fieldModalTitle').textContent = '编辑字段';
        document.getElementById('fieldId').value = field.id;
        document.getElementById('fieldName').value = field.field_name;
        document.getElementById('fieldLabel').value = field.field_label;
        document.getElementById('fieldType').value = field.field_type;
        document.getElementById('fieldRequired').value = field.is_required.toString();
        document.getElementById('fieldOrder').value = field.sort_order;
        document.getElementById('currentTemplate').value = templateType;
        document.getElementById('fieldModal').classList.add('show');
      } catch (e) {
        alert('获取字段信息失败: ' + e.message);
      }
    }

    function closeFieldModal() {
      document.getElementById('fieldModal').classList.remove('show');
    }

    async function saveField() {
      var id = document.getElementById('fieldId').value;
      var name = document.getElementById('fieldName').value.trim();
      var label = document.getElementById('fieldLabel').value.trim();
      var type = document.getElementById('fieldType').value;
      var required = document.getElementById('fieldRequired').value === 'true';
      var order = parseInt(document.getElementById('fieldOrder').value) || 0;
      var templateType = document.getElementById('currentTemplate').value;
      
      if (!name) { alert('请输入字段名称'); return; }
      if (!label) { alert('请输入字段标签'); return; }
      
      try {
        if (id) {
          var result = await db.from('template_configs').update({ 
            field_name: name, 
            field_label: label, 
            field_type: type, 
            is_required: required, 
            sort_order: order 
          }).eq('id', id);
        } else {
          var result = await db.from('template_configs').insert([{ 
            template_type: templateType,
            field_name: name, 
            field_label: label, 
            field_type: type, 
            is_required: required, 
            sort_order: order 
          }]);
        }
        if (result.error) throw result.error;
        closeFieldModal();
        loadFields(templateType);
        alert('保存成功');
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    async function deleteField(id, templateType) {
      if (!confirm('确定要删除这个字段吗？')) return;
      try {
        var result = await db.from('template_configs').delete().eq('id', id);
        if (result.error) throw result.error;
        loadFields(templateType);
        alert('删除成功');
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    async function moveField(id, templateType, direction) {
      try {
        // 获取当前字段
        var currentResult = await db.from('template_configs').select('*').eq('id', id).single();
        if (currentResult.error) throw currentResult.error;
        var currentField = currentResult.data;
        var currentOrder = currentField.sort_order;
        
        // 获取相邻字段
        var adjacentResult;
        if (direction === -1) {
          adjacentResult = await db.from('template_configs')
            .select('*')
            .eq('template_type', templateType)
            .lt('sort_order', currentOrder)
            .order('sort_order', { ascending: false })
            .limit(1);
        } else {
          adjacentResult = await db.from('template_configs')
            .select('*')
            .eq('template_type', templateType)
            .gt('sort_order', currentOrder)
            .order('sort_order', { ascending: true })
            .limit(1);
        }
        
        if (adjacentResult.data.length === 0) return; // 已经是第一个或最后一个
        
        var adjacentField = adjacentResult.data[0];
        var adjacentOrder = adjacentField.sort_order;
        
        // 交换排序值
        await db.from('template_configs').update({ sort_order: adjacentOrder }).eq('id', id);
        await db.from('template_configs').update({ sort_order: currentOrder }).eq('id', adjacentField.id);
        
        loadFields(templateType);
      } catch (e) {
        alert('移动失败: ' + e.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadSDK);
  </script>
</body>
</html>
