<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限管理修复测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .test-title { font-size: 18px; margin-bottom: 15px; color: #333; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .info { background: #e3f2fd; color: #1565c0; }
        .btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #5a6fd6; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔐 权限管理修复测试</h1>
    <p>此页面用于验证权限管理功能的修复是否有效</p>

    <div class="test-section">
        <div class="test-title">1. Supabase 连接测试</div>
        <button class="btn" onclick="testSupabaseConnection()">测试连接</button>
        <div id="conn-result"></div>
    </div>

    <div class="test-section">
        <div class="test-title">2. confirm_email RPC 函数测试</div>
        <button class="btn" onclick="testConfirmEmailFunction()">测试 RPC 函数</button>
        <div id="rpc-result"></div>
    </div>

    <div class="test-section">
        <div class="test-title">3. user_roles 表权限测试</div>
        <button class="btn" onclick="testUserRolesPermissions()">测试表权限</button>
        <div id="roles-result"></div>
    </div>

    <div class="test-section">
        <div class="test-title">4. 创建用户测试</div>
        <input type="email" id="testEmail" placeholder="测试邮箱" style="padding: 8px; margin-right: 10px;">
        <input type="password" id="testPassword" placeholder="测试密码" style="padding: 8px; margin-right: 10px;">
        <button class="btn" onclick="testCreateUser()">创建测试用户</button>
        <div id="create-result"></div>
    </div>

    <div class="test-section">
        <div class="test-title">测试日志</div>
        <pre id="logs"></pre>
    </div>

    <script>
        const SUPABASE_URL = 'https://dxrghlqnwfwpuxjvyisv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4cmdobHFud2Z3cHV4anZ5aXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODYyMjAsImV4cCI6MjA5MDI2MjIyMH0.r6hDrTVZ1p_Qq6sHuLeBEo3SFqGEh0trwbRMXLWnrNQ';
        
        let supabaseClient;

        function log(message) {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logs.textContent = `[${time}] ${message}\n` + logs.textContent;
        }

        function setResult(id, message, type = 'info') {
            const el = document.getElementById(id);
            el.className = `result ${type}`;
            el.textContent = message;
        }

        async function initSupabase() {
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                return true;
            }
            return false;
        }

        async function testSupabaseConnection() {
            try {
                if (!supabaseClient) await initSupabase();
                const { data, error } = await supabaseClient.from('positions').select('*').limit(1);
                if (error) throw error;
                setResult('conn-result', '✅ Supabase 连接成功！', 'success');
                log('Supabase 连接测试通过');
            } catch (e) {
                setResult('conn-result', '❌ 连接失败: ' + e.message, 'error');
                log('Supabase 连接测试失败: ' + e.message);
            }
        }

        async function testConfirmEmailFunction() {
            try {
                if (!supabaseClient) await initSupabase();
                const { error } = await supabaseClient.rpc('confirm_email', { user_email: 'test@example.com' });
                if (error) {
                    if (error.message.includes('Could not find the function')) {
                        setResult('rpc-result', '❌ confirm_email 函数不存在，请执行修复脚本', 'error');
                        log('RPC函数不存在');
                    } else {
                        setResult('rpc-result', '⚠️ RPC调用有错误但函数存在: ' + error.message, 'info');
                        log('RPC函数存在，但执行有错误: ' + error.message);
                    }
                } else {
                    setResult('rpc-result', '✅ confirm_email RPC 函数正常工作', 'success');
                    log('RPC函数测试通过');
                }
            } catch (e) {
                setResult('rpc-result', '❌ 测试失败: ' + e.message, 'error');
                log('RPC测试失败: ' + e.message);
            }
        }

        async function testUserRolesPermissions() {
            try {
                if (!supabaseClient) await initSupabase();
                
                const { data, error: selectError } = await supabaseClient.from('user_roles').select('*').limit(1);
                if (selectError) {
                    setResult('roles-result', '❌ 查询 user_roles 失败: ' + selectError.message, 'error');
                    log('查询user_roles失败: ' + selectError.message);
                    return;
                }

                setResult('roles-result', '✅ user_roles 表权限测试通过，现有记录数: ' + (data.length || 0), 'success');
                log('user_roles表权限测试通过');
            } catch (e) {
                setResult('roles-result', '❌ 测试失败: ' + e.message, 'error');
                log('user_roles权限测试失败: ' + e.message);
            }
        }

        async function testCreateUser() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            if (!email || !password) {
                setResult('create-result', '请输入邮箱和密码', 'error');
                return;
            }

            try {
                if (!supabaseClient) await initSupabase();
                
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    setResult('create-result', '❌ 创建用户失败: ' + authError.message, 'error');
                    log('创建用户失败: ' + authError.message);
                    return;
                }

                if (!authData.user) {
                    setResult('create-result', '❌ 创建用户失败：未返回用户信息', 'error');
                    log('创建用户失败：无用户信息');
                    return;
                }

                await supabaseClient.rpc('confirm_email', { user_email: email }).catch(() => {});

                const { error: roleError } = await supabaseClient.from('user_roles').insert({
                    user_id: authData.user.id,
                    role: 'operator',
                    name: '测试用户'
                });

                if (roleError) {
                    setResult('create-result', '⚠️ 用户创建成功，但角色插入失败: ' + roleError.message, 'info');
                    log('用户创建成功，但角色插入失败: ' + roleError.message);
                } else {
                    setResult('create-result', '✅ 用户创建成功！用户ID: ' + authData.user.id, 'success');
                    log('用户创建测试通过，用户ID: ' + authData.user.id);
                }

                document.getElementById('testEmail').value = '';
                document.getElementById('testPassword').value = '';
                
            } catch (e) {
                setResult('create-result', '❌ 测试失败: ' + e.message, 'error');
                log('用户创建测试失败: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initSupabase();
            log('测试页面初始化完成');
        });
    </script>
</body>
</html>
