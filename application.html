<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应聘信息采集 - 招聘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .main-content { padding: 30px; }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .required { color: #e74c3c; margin-left: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-top: 30px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading p { margin-top: 20px; color: #666; }
    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>正在加载系统...</p>
  </div>

  <div class="container">
    <div class="header">
      <h1>应聘信息采集</h1>
      <p>请填写以下信息完成应聘登记</p>
    </div>
    
    <div class="main-content">
      <div class="alert alert-info">
        <strong>温馨提示：</strong>请如实填写以下信息，完成后将进入面试预约环节
      </div>

      <form id="applicationForm">
        <div class="form-row">
          <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <input type="text" id="name" placeholder="请输入您的姓名" maxlength="50">
          </div>
          <div class="form-group">
            <label>性别 <span class="required">*</span></label>
            <select id="gender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>联系电话 <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="请输入您的手机号码" maxlength="11">
          </div>
          <div class="form-group">
            <label>年龄 <span class="required">*</span></label>
            <input type="number" id="age" placeholder="请输入您的年龄" min="18" max="65">
          </div>
        </div>

        <div class="form-group">
          <label>应聘岗位类型 <span class="required">*</span></label>
          <select id="jobType" onchange="switchTemplate()">
            <option value="">请选择岗位类型</option>
            <option value="apprentice">学徒/普工</option>
            <option value="technician">牙科技工/质检员</option>
          </select>
        </div>

        <div class="form-group">
          <label>应聘岗位 <span class="required">*</span></label>
          <select id="position">
            <option value="">请选择岗位</option>
          </select>
        </div>

        <!-- 学徒/普工模板 -->
        <div id="apprenticeTemplate" style="display: none;">
          <div class="form-group">
            <label>教育背景 <span class="required">*</span></label>
            <textarea id="education_background" rows="3" placeholder="请描述您的教育背景，如学历、专业等" maxlength="500"></textarea>
          </div>

          <div class="form-group">
            <label>工作意愿 <span class="required">*</span></label>
            <textarea id="work_willingness" rows="3" placeholder="请描述您的工作意愿和期望" maxlength="500"></textarea>
          </div>

          <div class="form-group">
            <label>期望薪资 <span class="required">*</span></label>
            <input type="text" id="expectation" placeholder="请输入您的期望薪资，如：3000-5000元" maxlength="50">
          </div>

          <div class="form-group">
            <label>到岗时间</label>
            <input type="text" id="availability" placeholder="请输入您的到岗时间，如：随时" maxlength="50">
          </div>

          <div class="form-group">
            <label>兴趣爱好</label>
            <textarea id="hobbies" rows="3" placeholder="请描述您的兴趣爱好" maxlength="200"></textarea>
          </div>
        </div>

        <!-- 牙科技工/质检员模板 -->
        <div id="technicianTemplate" style="display: none;">
          <div class="form-group">
            <label>专业技能 <span class="required">*</span></label>
            <textarea id="professional_skills" rows="3" placeholder="请详细描述您的专业技能，如CAD设计、烤瓷技术等" maxlength="500"></textarea>
          </div>

          <div class="form-group">
            <label>资质证书 <span class="required">*</span></label>
            <textarea id="certificates" rows="3" placeholder="请列出您的相关资质证书" maxlength="500"></textarea>
          </div>

          <div class="form-group">
            <label>工作年限 <span class="required">*</span></label>
            <input type="text" id="work_years" placeholder="请输入您的工作年限，如：3年" maxlength="50">
          </div>

          <div class="form-group">
            <label>前公司</label>
            <input type="text" id="previous_company" placeholder="请输入您的前公司" maxlength="100">
          </div>

          <div class="form-group">
            <label>作品集</label>
            <textarea id="portfolio" rows="3" placeholder="请描述您的作品集或提供链接" maxlength="500"></textarea>
          </div>
        </div>

        <div class="form-group">
          <label>学历 <span class="required">*</span></label>
          <select id="education">
            <option value="">请选择学历</option>
            <option value="初中及以下">初中及以下</option>
            <option value="高中/中专">高中/中专</option>
            <option value="大专">大专</option>
            <option value="本科">本科</option>
            <option value="硕士及以上">硕士及以上</option>
          </select>
        </div>

        <div class="form-group">
          <label>工作经验 <span class="required">*</span></label>
          <select id="experience">
            <option value="">请选择工作经验</option>
            <option value="应届毕业生">应届毕业生</option>
            <option value="1年以下">1年以下</option>
            <option value="1-3年">1-3年</option>
            <option value="3-5年">3-5年</option>
            <option value="5-10年">5-10年</option>
            <option value="10年以上">10年以上</option>
          </select>
        </div>

        <div class="form-group">
          <label>专业技能</label>
          <textarea id="skills" rows="3" placeholder="请列出您的专业技能，如：CAD设计、烤瓷技术等" maxlength="200"></textarea>
        </div>

        <div class="form-group">
          <label>工作经历</label>
          <textarea id="work_experience" rows="4" placeholder="请简要描述您的工作经历，包括公司名称、职位、工作内容等" maxlength="500"></textarea>
        </div>

        <div class="form-group">
          <label>期望薪资</label>
          <input type="text" id="salary_expectation" placeholder="请输入您的期望薪资，如：5000-8000元" maxlength="50">
        </div>

        <div class="form-group">
          <label>备注信息</label>
          <textarea id="notes" rows="3" placeholder="如有特殊情况请在此说明（选填）" maxlength="200"></textarea>
        </div>

        <button type="submit" class="btn" id="submitBtn">下一步：预约面试</button>
      </form>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://ztybxgnelynmsgkeqosz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0eWJ4Z25lbHlubXNna2Vxb3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NjAsImV4cCI6MjA4OTg0MzU2MH0.ISKHxvS_1hR5SkluCQ69O6UQNDHMOisPacaRlm0d33M';

    var db = null;
    var positions = [];

    function loadSDK() {
      var cdnList = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
      ];
      var index = 0;

      function tryLoad() {
        if (index >= cdnList.length) {
          document.getElementById('loading').innerHTML = '<p style="color:#c62828;">系统加载失败，请检查网络后刷新页面</p>';
          return;
        }
        var script = document.createElement('script');
        script.src = cdnList[index];
        script.onload = function() { initApp(); };
        script.onerror = function() { index++; tryLoad(); };
        document.head.appendChild(script);
      }
      tryLoad();
    }

    async function initApp() {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      // 加载岗位数据
      await loadPositions();
      
      // 绑定表单提交
      document.getElementById('applicationForm').addEventListener('submit', onSubmit);

      // 隐藏加载
      document.getElementById('loading').classList.add('hidden');
    }

    function switchTemplate() {
      var jobType = document.getElementById('jobType').value;
      var apprenticeTemplate = document.getElementById('apprenticeTemplate');
      var technicianTemplate = document.getElementById('technicianTemplate');
      
      if (jobType === 'apprentice') {
        apprenticeTemplate.style.display = 'block';
        technicianTemplate.style.display = 'none';
      } else if (jobType === 'technician') {
        apprenticeTemplate.style.display = 'none';
        technicianTemplate.style.display = 'block';
      } else {
        apprenticeTemplate.style.display = 'none';
        technicianTemplate.style.display = 'none';
      }
    }

    async function loadPositions() {
      try {
        var posResult = await db.from('positions').select('*').eq('is_active', true).order('sort_order');
        if (posResult.data && posResult.data.length > 0) {
          positions = posResult.data;
        } else {
          // 使用默认岗位
          positions = [
            { id: 1, name: '设计师' },
            { id: 2, name: 'CAD/CAM技术员' },
            { id: 3, name: '模型制作员' },
            { id: 4, name: '烤瓷技术员' },
            { id: 5, name: '质检员' },
            { id: 6, name: '生产主管' },
            { id: 7, name: '其他' }
          ];
        }

        // 填充岗位下拉框
        var posSelect = document.getElementById('position');
        posSelect.innerHTML = '<option value="">请选择岗位</option>';
        for (var i = 0; i < positions.length; i++) {
          var opt = document.createElement('option');
          opt.value = positions[i].name;
          opt.textContent = positions[i].name;
          posSelect.appendChild(opt);
        }
      } catch (e) {
        console.error('加载岗位失败:', e);
        // 使用默认岗位
        positions = [
          { id: 1, name: '设计师' },
          { id: 2, name: 'CAD/CAM技术员' },
          { id: 3, name: '模型制作员' },
          { id: 4, name: '烤瓷技术员' },
          { id: 5, name: '质检员' },
          { id: 6, name: '生产主管' },
          { id: 7, name: '其他' }
        ];
        
        // 填充默认岗位
        var posSelect = document.getElementById('position');
        posSelect.innerHTML = '<option value="">请选择岗位</option>';
        for (var i = 0; i < positions.length; i++) {
          var opt = document.createElement('option');
          opt.value = positions[i].name;
          opt.textContent = positions[i].name;
          posSelect.appendChild(opt);
        }
      }
    }

    async function onSubmit(e) {
      e.preventDefault();

      var name = document.getElementById('name').value.trim();
      var gender = document.getElementById('gender').value;
      var phone = document.getElementById('phone').value.trim();
      var age = document.getElementById('age').value;
      var jobType = document.getElementById('jobType').value;
      var position = document.getElementById('position').value;
      var education = document.getElementById('education').value;
      var experience = document.getElementById('experience').value;
      var notes = document.getElementById('notes').value.trim();

      // 表单验证
      if (!name) { alert('请输入姓名'); return; }
      if (!gender) { alert('请选择性别'); return; }
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { alert('请输入正确的手机号码'); return; }
      if (!age || age < 18 || age > 65) { alert('请输入正确的年龄'); return; }
      if (!jobType) { alert('请选择应聘岗位类型'); return; }
      if (!position) { alert('请选择应聘岗位'); return; }
      if (!education) { alert('请选择学历'); return; }
      if (!experience) { alert('请选择工作经验'); return; }

      // 模板特定字段验证
      if (jobType === 'apprentice') {
        var education_background = document.getElementById('education_background').value.trim();
        var work_willingness = document.getElementById('work_willingness').value.trim();
        var expectation = document.getElementById('expectation').value.trim();
        if (!education_background) { alert('请填写教育背景'); return; }
        if (!work_willingness) { alert('请填写工作意愿'); return; }
        if (!expectation) { alert('请填写期望薪资'); return; }
      } else if (jobType === 'technician') {
        var professional_skills = document.getElementById('professional_skills').value.trim();
        var certificates = document.getElementById('certificates').value.trim();
        var work_years = document.getElementById('work_years').value.trim();
        if (!professional_skills) { alert('请填写专业技能'); return; }
        if (!certificates) { alert('请填写资质证书'); return; }
        if (!work_years) { alert('请填写工作年限'); return; }
      }

      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      try {
        // 构建应聘信息数据
        var applicationData = {
          name: name,
          gender: gender,
          phone: phone,
          age: parseInt(age),
          job_type: jobType,
          position: position,
          education: education,
          experience: experience,
          notes: notes,
          status: 'pending'
        };

        // 添加模板特定字段
        if (jobType === 'apprentice') {
          applicationData.education_background = document.getElementById('education_background').value.trim();
          applicationData.work_willingness = document.getElementById('work_willingness').value.trim();
          applicationData.expectation = document.getElementById('expectation').value.trim();
          applicationData.availability = document.getElementById('availability').value.trim();
          applicationData.hobbies = document.getElementById('hobbies').value.trim();
        } else if (jobType === 'technician') {
          applicationData.professional_skills = document.getElementById('professional_skills').value.trim();
          applicationData.certificates = document.getElementById('certificates').value.trim();
          applicationData.work_years = document.getElementById('work_years').value.trim();
          applicationData.previous_company = document.getElementById('previous_company').value.trim();
          applicationData.portfolio = document.getElementById('portfolio').value.trim();
        }

        // 保存到数据库
        var result = await db.from('applications').insert([applicationData]).select();
        if (result.error) throw result.error;

        // 存储到localStorage，以便预约页面使用
        localStorage.setItem('applicationData', JSON.stringify(applicationData));

        // 跳转到预约页面
        window.location.href = 'booking.html';
      } catch (e) {
        alert('提交失败: ' + e.message);
        btn.disabled = false;
        btn.textContent = '下一步：预约面试';
      }
    }

    document.addEventListener('DOMContentLoaded', loadSDK);
  </script>
</body>
</html>
