<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统设置 - 招聘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .tabs {
      display: flex;
      background: #f8f9ff;
      border-bottom: 1px solid #e0e0e0;
    }
    .tab {
      padding: 15px 30px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab:hover { color: #667eea; }
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    .main-content { padding: 30px; }
    .section { display: none; }
    .section.active { display: block; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }
    .card h3 { margin: 0 0 15px 0; color: #333; font-size: 18px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #2e7d32; color: white; }
    .btn-success:hover { background: #1b5e20; }
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    .data-table th, .data-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    .data-table th {
      background: #f8f9ff;
      font-weight: 600;
      color: #333;
    }
    .data-table tr:hover { background: #f8f9ff; }
    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
    .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { margin: 0; }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .nav-links {
      margin-top: 15px;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      opacity: 0.9;
    }
    .nav-links a:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>系统设置</h1>
      <p>招聘管理系统</p>
      <div class="nav-links">
        <a href="admin-standalone.html">← 返回预约管理</a>
      </div>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('positions')">岗位管理</div>
      <div class="tab" onclick="switchTab('timeslots')">时段配置</div>
      <div class="tab" onclick="switchTab('tips')">温馨提示</div>
      <div class="tab" onclick="switchTab('banners')">横幅文本</div>
    </div>
    
    <div class="main-content">
      <!-- 岗位管理 -->
      <div id="positions" class="section active">
        <div class="card">
          <h3>岗位列表</h3>
          <button class="btn btn-primary" onclick="showAddPositionModal()">+ 添加岗位</button>
          <table class="data-table">
            <thead>
              <tr>
                <th>排序</th>
                <th>岗位名称</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="positionsList">
              <tr><td colspan="4" class="loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- 时段配置 -->
      <div id="timeslots" class="section">
        <div class="card">
          <h3>面试时段配置</h3>
          <p style="color: #666; margin-bottom: 15px; font-size: 14px;">1小时时段限10人，半小时时段限5人</p>
          <button class="btn btn-primary" onclick="showAddSlotModal()">+ 添加时段</button>
          <table class="data-table">
            <thead>
              <tr>
                <th>排序</th>
                <th>时段名称</th>
                <th>时间范围</th>
                <th>容量</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="slotsList">
              <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- 温馨提示 -->
      <div id="tips" class="section">
        <div class="card">
          <h3>预约须知（显示在预约页面顶部）</h3>
          <div class="form-group">
            <label>预约须知内容（每行一条，用 | 分隔）</label>
            <textarea id="bookingNotice" rows="5" placeholder="面试时间：周一至周五|请提前至少2小时预约|请确保联系方式正确"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveBookingNotice()">保存预约须知</button>
        </div>
        
        <div class="card">
          <h3>温馨提示（显示在预约成功页面）</h3>
          <div class="form-group">
            <label>温馨提示内容（每行一条，用 | 分隔）</label>
            <textarea id="successTips" rows="5" placeholder="请携带身份证原件准时到达|如需修改或取消预约，请致电：XXX-XXXX-XXXX|面试地点：XXXXXXXXXXXXXXXX"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveSuccessTips()">保存温馨提示</button>
        </div>
      </div>
      
      <!-- 横幅文本配置 -->
      <div id="banners" class="section">
        <div class="card">
          <h3>横幅文本配置</h3>
          <p style="color: #666; margin-bottom: 15px; font-size: 14px;">自定义各页面的横幅标题文本</p>
          
          <div class="form-group">
            <label>系统设置页面横幅</label>
            <input type="text" id="bannerSettings" placeholder="请输入系统设置页面横幅文本" maxlength="50">
          </div>
          
          <div class="form-group">
            <label>预约页面横幅</label>
            <input type="text" id="bannerBooking" placeholder="请输入预约页面横幅文本" maxlength="50">
          </div>
          
          <div class="form-group">
            <label>管理页面横幅</label>
            <input type="text" id="bannerAdmin" placeholder="请输入管理页面横幅文本" maxlength="50">
          </div>
          
          <button class="btn btn-primary" onclick="saveBanners()">保存横幅文本</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 添加岗位模态框 -->
  <div id="positionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="positionModalTitle">添加岗位</h3>
        <button class="modal-close" onclick="closePositionModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>岗位名称</label>
        <input type="text" id="positionName" placeholder="请输入岗位名称">
      </div>
      <div class="form-group">
        <label>排序（数字越小越靠前）</label>
        <input type="number" id="positionOrder" value="1">
      </div>
      <input type="hidden" id="positionId">
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closePositionModal()">取消</button>
        <button class="btn btn-primary" onclick="savePosition()">保存</button>
      </div>
    </div>
  </div>
  
  <!-- 添加时段模态框 -->
  <div id="slotModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="slotModalTitle">添加时段</h3>
        <button class="modal-close" onclick="closeSlotModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>时段名称</label>
        <input type="text" id="slotLabel" placeholder="如：上午场 09:00-10:00">
      </div>
      <div class="form-group">
        <label>开始时间</label>
        <input type="time" id="slotStart" value="09:00">
      </div>
      <div class="form-group">
        <label>结束时间</label>
        <input type="time" id="slotEnd" value="10:00">
      </div>
      <div class="form-group">
        <label>容量（1小时=10人，半小时=5人）</label>
        <input type="number" id="slotCapacity" value="10">
      </div>
      <div class="form-group">
        <label>排序</label>
        <input type="number" id="slotOrder" value="1">
      </div>
      <input type="hidden" id="slotId">
      <input type="hidden" id="slotKey">
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeSlotModal()">取消</button>
        <button class="btn btn-primary" onclick="saveSlot()">保存</button>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://ztybxgnelynmsgkeqosz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0eWJ4Z25lbHlubXNna2Vxb3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NjAsImV4cCI6MjA4OTg0MzU2MH0.ISKHxvS_1hR5SkluCQ69O6UQNDHMOisPacaRlm0d33M';

    var db = null;

    function loadSDK() {
      var cdnList = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
      ];
      var index = 0;

      function tryLoad() {
        if (index >= cdnList.length) {
          alert('系统加载失败，请检查网络');
          return;
        }
        var script = document.createElement('script');
        script.src = cdnList[index];
        script.onload = function() { initApp(); };
        script.onerror = function() { index++; tryLoad(); };
        document.head.appendChild(script);
      }
      tryLoad();
    }

    async function initApp() {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      loadPositions();
      loadSlots();
      await loadTips();
      
      // 加载横幅文本
      try {
        var bannerResult = await db.from('system_config').select('*').eq('config_key', 'banner_settings');
        if (bannerResult.data && bannerResult.data.length > 0 && bannerResult.data[0].config_value) {
          document.querySelector('.header h1').textContent = bannerResult.data[0].config_value;
        }
      } catch (e) {
        console.error('加载横幅文本失败:', e);
      }
    }

    function switchTab(tabId) {
      var tabs = document.querySelectorAll('.tab');
      var sections = document.querySelectorAll('.section');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        sections[i].classList.remove('active');
      }
      event.target.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    // ===== 岗位管理 =====
    async function loadPositions() {
      var tbody = document.getElementById('positionsList');
      try {
        var result = await db.from('positions').select('*').order('sort_order');
        if (result.error) throw result.error;
        
        if (result.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;">暂无岗位数据</td></tr>';
          return;
        }
        
        var html = '';
        for (var i = 0; i < result.data.length; i++) {
          var p = result.data[i];
          html += '<tr>';
          html += '<td>' + p.sort_order + '</td>';
          html += '<td>' + p.name + '</td>';
          html += '<td>' + (p.is_active ? '<span style="color:#2e7d32;">启用</span>' : '<span style="color:#999;">禁用</span>') + '</td>';
          html += '<td>';
          html += '<button class="btn btn-secondary" onclick="editPosition(' + p.id + ', \'' + p.name + '\', ' + p.sort_order + ')">编辑</button> ';
          html += '<button class="btn btn-danger" onclick="deletePosition(' + p.id + ')">删除</button>';
          html += '</td>';
          html += '</tr>';
        }
        tbody.innerHTML = html;
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:#c62828;">加载失败: ' + e.message + '</td></tr>';
      }
    }

    function showAddPositionModal() {
      document.getElementById('positionModalTitle').textContent = '添加岗位';
      document.getElementById('positionId').value = '';
      document.getElementById('positionName').value = '';
      document.getElementById('positionOrder').value = '1';
      document.getElementById('positionModal').classList.add('show');
    }

    function editPosition(id, name, order) {
      document.getElementById('positionModalTitle').textContent = '编辑岗位';
      document.getElementById('positionId').value = id;
      document.getElementById('positionName').value = name;
      document.getElementById('positionOrder').value = order;
      document.getElementById('positionModal').classList.add('show');
    }

    function closePositionModal() {
      document.getElementById('positionModal').classList.remove('show');
    }

    async function savePosition() {
      var id = document.getElementById('positionId').value;
      var name = document.getElementById('positionName').value.trim();
      var order = parseInt(document.getElementById('positionOrder').value) || 1;
      
      if (!name) {
        alert('请输入岗位名称');
        return;
      }
      
      try {
        if (id) {
          var result = await db.from('positions').update({ name: name, sort_order: order }).eq('id', id);
        } else {
          var result = await db.from('positions').insert([{ name: name, sort_order: order, is_active: true }]);
        }
        if (result.error) throw result.error;
        closePositionModal();
        loadPositions();
        alert('保存成功');
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    async function deletePosition(id) {
      if (!confirm('确定要删除这个岗位吗？')) return;
      try {
        var result = await db.from('positions').delete().eq('id', id);
        if (result.error) throw result.error;
        loadPositions();
        alert('删除成功');
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    // ===== 时段管理 =====
    async function loadSlots() {
      var tbody = document.getElementById('slotsList');
      try {
        var result = await db.from('time_slots').select('*').order('sort_order');
        if (result.error) throw result.error;
        
        if (result.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无时段数据</td></tr>';
          return;
        }
        
        var html = '';
        for (var i = 0; i < result.data.length; i++) {
          var s = result.data[i];
          html += '<tr>';
          html += '<td>' + s.sort_order + '</td>';
          html += '<td>' + s.label + '</td>';
          html += '<td>' + s.start_time + ' - ' + s.end_time + '</td>';
          html += '<td>' + s.capacity + '人</td>';
          html += '<td>' + (s.is_active ? '<span style="color:#2e7d32;">启用</span>' : '<span style="color:#999;">禁用</span>') + '</td>';
          html += '<td>';
          html += '<button class="btn btn-secondary" onclick="editSlot(' + s.id + ', \'' + s.slot_key + '\', \'' + s.label + '\', \'' + s.start_time + '\', \'' + s.end_time + '\', ' + s.capacity + ', ' + s.sort_order + ')">编辑</button> ';
          html += '<button class="btn btn-danger" onclick="deleteSlot(' + s.id + ')">删除</button>';
          html += '</td>';
          html += '</tr>';
        }
        tbody.innerHTML = html;
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:#c62828;">加载失败: ' + e.message + '</td></tr>';
      }
    }

    function showAddSlotModal() {
      document.getElementById('slotModalTitle').textContent = '添加时段';
      document.getElementById('slotId').value = '';
      document.getElementById('slotKey').value = '';
      document.getElementById('slotLabel').value = '';
      document.getElementById('slotStart').value = '09:00';
      document.getElementById('slotEnd').value = '10:00';
      document.getElementById('slotCapacity').value = '10';
      document.getElementById('slotOrder').value = '1';
      document.getElementById('slotModal').classList.add('show');
    }

    function editSlot(id, key, label, start, end, capacity, order) {
      document.getElementById('slotModalTitle').textContent = '编辑时段';
      document.getElementById('slotId').value = id;
      document.getElementById('slotKey').value = key;
      document.getElementById('slotLabel').value = label;
      document.getElementById('slotStart').value = start;
      document.getElementById('slotEnd').value = end;
      document.getElementById('slotCapacity').value = capacity;
      document.getElementById('slotOrder').value = order;
      document.getElementById('slotModal').classList.add('show');
    }

    function closeSlotModal() {
      document.getElementById('slotModal').classList.remove('show');
    }

    async function saveSlot() {
      var id = document.getElementById('slotId').value;
      var key = document.getElementById('slotKey').value;
      var label = document.getElementById('slotLabel').value.trim();
      var start = document.getElementById('slotStart').value;
      var end = document.getElementById('slotEnd').value;
      var capacity = parseInt(document.getElementById('slotCapacity').value) || 10;
      var order = parseInt(document.getElementById('slotOrder').value) || 1;
      
      if (!label) {
        alert('请输入时段名称');
        return;
      }
      
      if (!key) {
        key = 'slot_' + Date.now();
      }
      
      try {
        if (id) {
          var result = await db.from('time_slots').update({ 
            label: label, 
            start_time: start, 
            end_time: end, 
            capacity: capacity, 
            sort_order: order 
          }).eq('id', id);
        } else {
          var result = await db.from('time_slots').insert([{ 
            slot_key: key,
            label: label, 
            start_time: start, 
            end_time: end, 
            capacity: capacity, 
            sort_order: order,
            is_active: true
          }]);
        }
        if (result.error) throw result.error;
        closeSlotModal();
        loadSlots();
        alert('保存成功');
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    async function deleteSlot(id) {
      if (!confirm('确定要删除这个时段吗？')) return;
      try {
        var result = await db.from('time_slots').delete().eq('id', id);
        if (result.error) throw result.error;
        loadSlots();
        alert('删除成功');
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    // ===== 温馨提示和横幅文本 =====
    async function loadTips() {
      try {
        var result = await db.from('system_config').select('*');
        if (result.error) throw result.error;
        
        for (var i = 0; i < result.data.length; i++) {
          var config = result.data[i];
          if (config.config_key === 'booking_notice') {
            document.getElementById('bookingNotice').value = config.config_value || '';
          } else if (config.config_key === 'success_tips') {
            document.getElementById('successTips').value = config.config_value || '';
          } else if (config.config_key === 'banner_settings') {
            document.getElementById('bannerSettings').value = config.config_value || '';
          } else if (config.config_key === 'banner_booking') {
            document.getElementById('bannerBooking').value = config.config_value || '';
          } else if (config.config_key === 'banner_admin') {
            document.getElementById('bannerAdmin').value = config.config_value || '';
          }
        }
      } catch (e) {
        console.error('加载配置失败:', e);
      }
    }

    async function saveBookingNotice() {
      var value = document.getElementById('bookingNotice').value.trim();
      try {
        var result = await db.from('system_config').update({ config_value: value }).eq('config_key', 'booking_notice');
        if (result.error) {
          if (result.error.code === 'PGRST116') {
            // 记录不存在，插入新记录
            var insertResult = await db.from('system_config').insert([{ config_key: 'booking_notice', config_value: value }]);
            if (insertResult.error) throw insertResult.error;
          } else {
            throw result.error;
          }
        }
        alert('保存成功');
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    async function saveBanners() {
      var settingsBanner = document.getElementById('bannerSettings').value.trim();
      var bookingBanner = document.getElementById('bannerBooking').value.trim();
      var adminBanner = document.getElementById('bannerAdmin').value.trim();
      
      try {
        // 保存系统设置页面横幅
        var settingsResult = await db.from('system_config').update({ config_value: settingsBanner }).eq('config_key', 'banner_settings');
        if (settingsResult.error) {
          if (settingsResult.error.code === 'PGRST116') {
            await db.from('system_config').insert([{ config_key: 'banner_settings', config_value: settingsBanner, description: '设置页面横幅文本' }]);
          } else {
            throw settingsResult.error;
          }
        }
        
        // 保存预约页面横幅
        var bookingResult = await db.from('system_config').update({ config_value: bookingBanner }).eq('config_key', 'banner_booking');
        if (bookingResult.error) {
          if (bookingResult.error.code === 'PGRST116') {
            await db.from('system_config').insert([{ config_key: 'banner_booking', config_value: bookingBanner, description: '预约页面横幅文本' }]);
          } else {
            throw bookingResult.error;
          }
        }
        
        // 保存管理页面横幅
        var adminResult = await db.from('system_config').update({ config_value: adminBanner }).eq('config_key', 'banner_admin');
        if (adminResult.error) {
          if (adminResult.error.code === 'PGRST116') {
            await db.from('system_config').insert([{ config_key: 'banner_admin', config_value: adminBanner, description: '管理页面横幅文本' }]);
          } else {
            throw adminResult.error;
          }
        }
        
        alert('保存成功');
        // 刷新页面以显示更新后的横幅
        location.reload();
      } catch (e) {
        alert('保存失败: ' + e.message);
        console.error('保存横幅文本失败:', e);
      }
    }

    document.addEventListener('DOMContentLoaded', loadSDK);
