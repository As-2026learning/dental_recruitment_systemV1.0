<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据同步测试 - 义齿工厂招聘系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=13"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1890ff;
            border-bottom: 2px solid #1890ff;
            padding-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .test-section h3 {
            margin-top: 0;
            color: #333;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        .btn-success {
            background: #52c41a;
            color: white;
        }
        .btn-danger {
            background: #ff4d4f;
            color: white;
        }
        button:hover {
            opacity: 0.8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .log-container {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }
        .log-info { color: #4fc1ff; }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-warn { color: #dcdcaa; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e8e8e8;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1890ff;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        .result-box {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .result-success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        .result-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 数据同步功能测试</h1>
        
        <div class="test-section">
            <h3>📊 数据概览</h3>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-box">
                    <div class="stat-value" id="appCount">-</div>
                    <div class="stat-label">Applications</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="rpCount">-</div>
                    <div class="stat-label">Recruitment Process</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="bookingCount">-</div>
                    <div class="stat-label">Bookings</div>
                </div>
            </div>
            <button class="btn-primary" onclick="loadDataCounts()">刷新数据计数</button>
        </div>

        <div class="test-section">
            <h3>🔄 同步测试</h3>
            <button class="btn-success" id="btnSync" onclick="testSync()">测试数据同步</button>
            <button class="btn-primary" onclick="testSyncWithDates()">同步数据 + 面试日期</button>
            <button class="btn-danger" onclick="clearLogs()">清除日志</button>
            <div id="syncResult"></div>
        </div>

        <div class="test-section">
            <h3>📝 操作日志</h3>
            <div class="log-container" id="logContainer">
                <div class="log-entry log-info">等待操作...</div>
            </div>
        </div>
    </div>

    <script>
        // 初始化Supabase客户端
        const supabaseUrl = window.SUPABASE_URL || 'https://your-project.supabase.co';
        const supabaseKey = window.SUPABASE_ANON_KEY || 'your-anon-key';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 日志函数
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '<div class="log-entry log-info">日志已清除</div>';
            document.getElementById('syncResult').innerHTML = '';
        }

        // 加载数据计数
        async function loadDataCounts() {
            log('正在加载数据计数...', 'info');
            
            try {
                const [appsResult, rpResult, bookingsResult] = await Promise.all([
                    supabaseClient.from('applications').select('*', { count: 'exact', head: true }),
                    supabaseClient.from('recruitment_process').select('*', { count: 'exact', head: true }),
                    supabaseClient.from('bookings').select('*', { count: 'exact', head: true })
                ]);

                document.getElementById('appCount').textContent = appsResult.count || 0;
                document.getElementById('rpCount').textContent = rpResult.count || 0;
                document.getElementById('bookingCount').textContent = bookingsResult.count || 0;

                log(`数据计数: Applications=${appsResult.count}, RP=${rpResult.count}, Bookings=${bookingsResult.count}`, 'success');
                
                if (appsResult.error) log(`Applications错误: ${appsResult.error.message}`, 'error');
                if (rpResult.error) log(`RP错误: ${rpResult.error.message}`, 'error');
                if (bookingsResult.error) log(`Bookings错误: ${bookingsResult.error.message}`, 'error');
                
            } catch (error) {
                log(`加载数据计数失败: ${error.message}`, 'error');
            }
        }

        // 测试数据同步
        async function testSync() {
            const btn = document.getElementById('btnSync');
            btn.disabled = true;
            btn.textContent = '同步中...';
            
            log('开始测试数据同步...', 'info');
            
            try {
                // 获取数据
                const [appsResult, rpResult] = await Promise.all([
                    supabaseClient.from('applications').select('*').order('created_at', { ascending: false }),
                    supabaseClient.from('recruitment_process').select('*')
                ]);

                if (appsResult.error) throw appsResult.error;
                if (rpResult.error) throw rpResult.error;

                const applications = appsResult.data || [];
                const existingRp = rpResult.data || [];
                
                log(`获取到 ${applications.length} 条 applications, ${existingRp.length} 条 recruitment_process`, 'info');

                // 构建映射
                const existingRpMap = new Map();
                existingRp.forEach(rp => {
                    if (rp.application_id) {
                        existingRpMap.set(rp.application_id, rp);
                    }
                });

                // 准备新记录
                const newRecords = [];
                const updateRecords = [];

                for (const app of applications) {
                    const existingRecord = existingRpMap.get(app.id);
                    
                    // 字段长度验证
                    const MAX_LENGTHS = {
                        source_status: 50,
                        name: 100,
                        phone: 20,
                        position: 100
                    };

                    const validateField = (value, maxLength) => {
                        if (!value) return value;
                        const str = String(value);
                        if (str.length > maxLength) {
                            log(`字段长度超过限制: "${str.substring(0, 20)}..." (${str.length} > ${maxLength})`, 'warn');
                            return str.substring(0, maxLength);
                        }
                        return str;
                    };

                    if (!existingRecord) {
                        newRecords.push({
                            application_id: app.id,
                            name: validateField(app.name, MAX_LENGTHS.name),
                            phone: validateField(app.phone, MAX_LENGTHS.phone),
                            position: validateField(app.position, MAX_LENGTHS.position),
                            source_status: validateField(app.status || 'pending', MAX_LENGTHS.source_status),
                            current_stage: 'application',
                            current_status: 'pending',
                            created_at: app.created_at,
                            updated_at: new Date().toISOString()
                        });
                    }
                }

                log(`准备插入 ${newRecords.length} 条新记录`, 'info');
                log(`准备更新 ${updateRecords.length} 条记录`, 'info');

                // 插入新记录
                let insertedCount = 0;
                if (newRecords.length > 0) {
                    const { data: inserted, error: insertError } = await supabaseClient
                        .from('recruitment_process')
                        .insert(newRecords)
                        .select();

                    if (insertError) {
                        log(`插入失败: ${insertError.message}`, 'error');
                        log(`错误详情: ${JSON.stringify(insertError)}`, 'error');
                        showResult(false, `插入失败: ${insertError.message}`);
                    } else {
                        insertedCount = inserted ? inserted.length : 0;
                        log(`成功插入 ${insertedCount} 条记录`, 'success');
                    }
                }

                showResult(true, `同步完成: 新增 ${insertedCount} 条记录`);
                
                // 刷新计数
                await loadDataCounts();
                
            } catch (error) {
                log(`同步失败: ${error.message}`, 'error');
                showResult(false, `同步失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '测试数据同步';
            }
        }

        // 同步数据 + 面试日期
        async function testSyncWithDates() {
            log('开始同步数据 + 面试日期...', 'info');
            
            await testSync();
            
            // 同步面试日期
            log('开始同步面试日期...', 'info');
            try {
                const { data: bookings, error } = await supabaseClient
                    .from('bookings')
                    .select('application_id, booking_date, time_slot')
                    .neq('status', 'cancelled');

                if (error) throw error;
                
                if (!bookings || bookings.length === 0) {
                    log('没有需要同步的面试日期', 'warn');
                    return;
                }

                // 去重
                const uniqueBookings = [];
                const seen = new Set();
                for (const b of bookings) {
                    if (!seen.has(b.application_id)) {
                        uniqueBookings.push(b);
                        seen.add(b.application_id);
                    }
                }

                log(`找到 ${uniqueBookings.length} 条唯一预约记录`, 'info');

                // 更新
                const updatePromises = uniqueBookings.map(async (booking) => {
                    const { error: updateError } = await supabaseClient
                        .from('recruitment_process')
                        .update({
                            interview_date: booking.booking_date,
                            interview_time_slot: booking.time_slot,
                            updated_at: new Date().toISOString()
                        })
                        .eq('application_id', booking.application_id);
                    
                    if (updateError) {
                        log(`更新面试日期失败 (app_id: ${booking.application_id}): ${updateError.message}`, 'error');
                        return false;
                    }
                    return true;
                });

                const results = await Promise.all(updatePromises);
                const successCount = results.filter(r => r).length;
                
                log(`面试日期同步完成: ${successCount}/${uniqueBookings.length} 条成功`, 'success');
                
            } catch (error) {
                log(`同步面试日期失败: ${error.message}`, 'error');
            }
        }

        function showResult(success, message) {
            const resultDiv = document.getElementById('syncResult');
            resultDiv.innerHTML = `<div class="result-box ${success ? 'result-success' : 'result-error'}">${success ? '✅' : '❌'} ${message}</div>`;
        }

        // 页面加载时自动加载数据计数
        document.addEventListener('DOMContentLoaded', () => {
            loadDataCounts();
        });
    </script>
</body>
</html>
