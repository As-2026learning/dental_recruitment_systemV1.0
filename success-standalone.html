<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约成功 - 义齿工厂招聘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; }
    .main-content { padding: 30px; text-align: center; }
    .success-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg { width: 50px; height: 50px; fill: white; }
    h2 { margin-bottom: 10px; color: #333; }
    .subtitle { color: #666; margin-bottom: 30px; }
    .booking-details {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-label { color: #666; }
    .detail-value { font-weight: 600; color: #333; }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-confirmed { background: #e8f5e9; color: #2e7d32; }
    .status-cancelled { background: #ffebee; color: #c62828; }
    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
      font-size: 14px;
    }
    .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      background: #f0f0f0;
      color: #333;
    }
    .btn:hover { background: #e0e0e0; }
    .alert-error { background: #ffebee; color: #c62828; padding: 20px; border-radius: 8px; }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:20px;color:#666;">正在加载预约信息...</p>
  </div>

  <div class="container">
    <div class="header">
      <h1>预约成功</h1>
    </div>
    
    <div class="main-content">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
        </svg>
      </div>
      
      <h2>恭喜！您的面试预约已提交成功</h2>
      <p class="subtitle">请妥善保存以下预约信息，按时参加面试</p>
      
      <div id="bookingDetails">
        <div style="text-align: center; padding: 40px;">加载中...</div>
      </div>
      
      <div class="alert alert-info" id="tipsBox">
        <strong>温馨提示：</strong>
        <ul style="margin-top: 8px; padding-left: 20px;" id="tipsList">
          <li>加载中...</li>
        </ul>
      </div>
      
      <a href="booking.html" class="btn">返回首页</a>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://ztybxgnelynmsgkeqosz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0eWJ4Z25lbHlubXNna2Vxb3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NjAsImV4cCI6MjA4OTg0MzU2MH0.ISKHxvS_1hR5SkluCQ69O6UQNDHMOisPacaRlm0d33M';

    var db = null;
    var timeSlots = [];

    function loadSDK() {
      var cdnList = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
      ];
      var index = 0;

      function tryLoad() {
        if (index >= cdnList.length) {
          showError('系统加载失败，请检查网络后刷新页面');
          return;
        }
        var script = document.createElement('script');
        script.src = cdnList[index];
        script.onload = function() { initApp(); };
        script.onerror = function() { index++; tryLoad(); };
        document.head.appendChild(script);
      }
      tryLoad();
    }

    async function initApp() {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      // 加载时段配置
      await loadTimeSlots();
      
      // 加载温馨提示
      await loadTips();
      
      // 加载预约信息
      await loadBooking();
    }

    async function loadTimeSlots() {
      try {
        var result = await db.from('time_slots').select('*').eq('is_active', true).order('sort_order');
        if (result.data && result.data.length > 0) {
          timeSlots = result.data;
        }
      } catch (e) {
        console.error('加载时段配置失败:', e);
      }
    }

    async function loadTips() {
      try {
        var result = await db.from('system_config').select('*').eq('config_key', 'success_tips');
        if (result.data && result.data.length > 0) {
          var tips = result.data[0].config_value.split('|');
          var tipsList = document.getElementById('tipsList');
          tipsList.innerHTML = '';
          for (var i = 0; i < tips.length; i++) {
            var li = document.createElement('li');
            li.textContent = tips[i];
            tipsList.appendChild(li);
          }
        }
      } catch (e) {
        console.error('加载温馨提示失败:', e);
      }
    }

    async function loadBooking() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');

      if (!id) {
        showError('未找到预约信息，请从预约页面重新提交');
        document.getElementById('loading').classList.add('hidden');
        return;
      }

      try {
        var result = await db.from('bookings').select('*').eq('id', id).single();
        if (result.error) throw result.error;
        if (!result.data) {
          showError('未找到预约信息');
          return;
        }
        displayBooking(result.data);
        document.getElementById('loading').classList.add('hidden');
      } catch (e) {
        showError('获取预约信息失败: ' + e.message);
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function displayBooking(b) {
      var container = document.getElementById('bookingDetails');
      
      // 查找时段标签
      var slotLabel = b.time_slot;
      for (var i = 0; i < timeSlots.length; i++) {
        if (timeSlots[i].slot_key === b.time_slot) {
          slotLabel = timeSlots[i].label;
          break;
        }
      }
      
      var statusMap = { 'pending': '待确认', 'confirmed': '已确认', 'cancelled': '已取消' };
      var statusLabel = statusMap[b.status] || b.status;

      var d = new Date(b.booking_date);
      var weeks = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      var dateStr = d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + weeks[d.getDay()];

      var html = '';
      html += '<div class="detail-item"><span class="detail-label">预约编号</span><span class="detail-value">' + b.id + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">姓名</span><span class="detail-value">' + b.name + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">联系电话</span><span class="detail-value">' + b.phone + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">应聘岗位</span><span class="detail-value">' + (b.position || '未选择') + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">面试日期</span><span class="detail-value">' + dateStr + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">面试时段</span><span class="detail-value">' + slotLabel + '</span></div>';
      html += '<div class="detail-item"><span class="detail-label">预约状态</span><span class="detail-value"><span class="status status-' + b.status + '">' + statusLabel + '</span></span></div>';
      
      if (b.notes) {
        html += '<div class="detail-item"><span class="detail-label">备注</span><span class="detail-value">' + b.notes + '</span></div>';
      }
      
      html += '<div class="detail-item"><span class="detail-label">预约时间</span><span class="detail-value">' + new Date(b.created_at).toLocaleString('zh-CN') + '</span></div>';

      container.innerHTML = html;
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('bookingDetails').innerHTML = '<div class="alert-error">' + msg + '</div>';
    }

    document.addEventListener('DOMContentLoaded', loadSDK);
  </script>
</body>
</html>
