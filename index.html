<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>义齿工厂招聘管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 50px;
            text-align: center;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .menu {
            display: grid;
            gap: 15px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .menu-item:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        .menu-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        .menu-text {
            text-align: left;
        }
        .menu-text h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        .menu-text p {
            font-size: 14px;
            opacity: 0.8;
        }
        .divider {
            margin: 30px 0;
            border-top: 1px solid #e0e0e0;
        }
        .admin-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏭</div>
        <h1>义齿工厂招聘管理系统</h1>
        <p class="subtitle">高效管理招聘流程，轻松预约面试</p>

        <div class="menu">
            <a href="candidate-form-complete.html" class="menu-item">
                <span class="menu-icon">📝</span>
                <div class="menu-text">
                    <h3>填写应聘信息</h3>
                    <p>应聘者入口，提交个人简历</p>
                </div>
            </a>

            <a href="booking.html" class="menu-item">
                <span class="menu-icon">📅</span>
                <div class="menu-text">
                    <h3>预约面试</h3>
                    <p>选择合适的时间段进行面试</p>
                </div>
            </a>
        </div>

        <div class="divider"></div>

        <div class="admin-section">
            <h2>🔐 后台管理</h2>
            <div class="menu">
                <a href="login.html" class="menu-item">
                    <span class="menu-icon">🔑</span>
                    <div class="menu-text">
                        <h3>管理员登录</h3>
                        <p>管理应聘信息、预约和系统设置</p>
                    </div>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>默认账号: admin / admin123</p>
        </div>
    </div>
</body>
</html>
