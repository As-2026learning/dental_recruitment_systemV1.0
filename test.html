<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统测试 - 招聘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .main-content { padding: 30px; }
    .test-section {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      background: #f8f9ff;
    }
    .test-section h3 {
      margin-bottom: 15px;
      color: #333;
      font-size: 18px;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
    }
    .test-result.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
    .test-result.error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .test-result.loading { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-right: 10px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .nav-links {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-links a {
      display: inline-block;
      padding: 8px 16px;
      background: #f0f0f0;
      color: #333;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
    .nav-links a:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>系统测试</h1>
      <p>招聘管理系统功能测试</p>
    </div>
    
    <div class="main-content">
      <div class="test-section">
        <h3>1. 数据库连接测试</h3>
        <button class="btn" onclick="testDatabaseConnection()">测试数据库连接</button>
        <div id="dbTestResult" class="test-result loading">正在测试...</div>
      </div>

      <div class="test-section">
        <h3>2. 应聘信息采集功能测试</h3>
        <button class="btn" onclick="testApplicationForm()">测试应聘表单</button>
        <div id="appTestResult" class="test-result loading">正在测试...</div>
      </div>

      <div class="test-section">
        <h3>3. 面试预约功能测试</h3>
        <button class="btn" onclick="testBookingForm()">测试预约表单</button>
        <div id="bookingTestResult" class="test-result loading">正在测试...</div>
      </div>

      <div class="test-section">
        <h3>4. 后台管理功能测试</h3>
        <button class="btn" onclick="testAdminFunctions()">测试管理功能</button>
        <div id="adminTestResult" class="test-result loading">正在测试...</div>
      </div>

      <div class="test-section">
        <h3>5. 数据导出功能测试</h3>
        <button class="btn" onclick="testExportFunctions()">测试导出功能</button>
        <div id="exportTestResult" class="test-result loading">正在测试...</div>
      </div>

      <div class="test-section">
        <h3>系统链接</h3>
        <div class="nav-links">
          <a href="application.html">应聘信息采集</a>
          <a href="booking.html">面试预约</a>
          <a href="admin-standalone.html">预约管理</a>
          <a href="applications.html">应聘信息管理</a>
          <a href="template-config.html">模板配置</a>
          <a href="settings.html">系统设置</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://ztybxgnelynmsgkeqosz.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0eWJ4Z25lbHlubXNna2Vxb3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NjAsImV4cCI6MjA4OTg0MzU2MH0.ISKHxvS_1hR5SkluCQ69O6UQNDHMOisPacaRlm0d33M';

    var db = null;

    function loadSDK() {
      var cdnList = [
        'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
        'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
      ];
      var index = 0;

      function tryLoad() {
        if (index >= cdnList.length) {
          document.getElementById('dbTestResult').innerHTML = '<span class="error">加载Supabase SDK失败</span>';
          return;
        }
        var script = document.createElement('script');
        script.src = cdnList[index];
        script.onload = function() { 
          db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          document.getElementById('dbTestResult').innerHTML = '<span class="success">Supabase SDK加载成功</span>';
        };
        script.onerror = function() { index++; tryLoad(); };
        document.head.appendChild(script);
      }
      tryLoad();
    }

    async function testDatabaseConnection() {
      var resultDiv = document.getElementById('dbTestResult');
      resultDiv.className = 'test-result loading';
      resultDiv.textContent = '正在测试数据库连接...';

      try {
        if (!db) {
          db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // 测试连接
        var testResult = await db.from('positions').select('*').limit(1);
        if (testResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '数据库连接失败: ' + testResult.error.message;
        } else {
          resultDiv.className = 'test-result success';
          resultDiv.textContent = '数据库连接成功！';
        }
      } catch (e) {
        resultDiv.className = 'test-result error';
        resultDiv.textContent = '测试失败: ' + e.message;
      }
    }

    async function testApplicationForm() {
      var resultDiv = document.getElementById('appTestResult');
      resultDiv.className = 'test-result loading';
      resultDiv.textContent = '正在测试应聘表单...';

      try {
        // 测试模板配置表
        var templateResult = await db.from('template_configs').select('*').limit(5);
        if (templateResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '模板配置表测试失败: ' + templateResult.error.message;
          return;
        }

        // 测试applications表
        var appResult = await db.from('applications').select('*').limit(1);
        if (appResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '应聘信息表测试失败: ' + appResult.error.message;
          return;
        }

        resultDiv.className = 'test-result success';
        resultDiv.textContent = '应聘表单功能测试成功！';
      } catch (e) {
        resultDiv.className = 'test-result error';
        resultDiv.textContent = '测试失败: ' + e.message;
      }
    }

    async function testBookingForm() {
      var resultDiv = document.getElementById('bookingTestResult');
      resultDiv.className = 'test-result loading';
      resultDiv.textContent = '正在测试预约表单...';

      try {
        // 测试time_slots表
        var slotResult = await db.from('time_slots').select('*').limit(5);
        if (slotResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '时段配置表测试失败: ' + slotResult.error.message;
          return;
        }

        // 测试bookings表
        var bookingResult = await db.from('bookings').select('*').limit(1);
        if (bookingResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '预约表测试失败: ' + bookingResult.error.message;
          return;
        }

        resultDiv.className = 'test-result success';
        resultDiv.textContent = '预约表单功能测试成功！';
      } catch (e) {
        resultDiv.className = 'test-result error';
        resultDiv.textContent = '测试失败: ' + e.message;
      }
    }

    async function testAdminFunctions() {
      var resultDiv = document.getElementById('adminTestResult');
      resultDiv.className = 'test-result loading';
      resultDiv.textContent = '正在测试管理功能...';

      try {
        // 测试system_config表
        var configResult = await db.from('system_config').select('*').limit(5);
        if (configResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '系统配置表测试失败: ' + configResult.error.message;
          return;
        }

        // 测试positions表
        var posResult = await db.from('positions').select('*').limit(5);
        if (posResult.error) {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '岗位表测试失败: ' + posResult.error.message;
          return;
        }

        resultDiv.className = 'test-result success';
        resultDiv.textContent = '管理功能测试成功！';
      } catch (e) {
        resultDiv.className = 'test-result error';
        resultDiv.textContent = '测试失败: ' + e.message;
      }
    }

    function testExportFunctions() {
      var resultDiv = document.getElementById('exportTestResult');
      resultDiv.className = 'test-result loading';
      resultDiv.textContent = '正在测试导出功能...';

      try {
        // 测试CSV导出功能
        var testData = [
          { name: '测试', phone: '13800138000', position: '测试岗位' }
        ];

        var headers = ['姓名', '电话', '岗位'];
        var csv = headers.join(',') + '\n';
        for (var i = 0; i < testData.length; i++) {
          var row = [testData[i].name, testData[i].phone, testData[i].position];
          csv += row.join(',') + '\n';
        }

        var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);

        if (url) {
          resultDiv.className = 'test-result success';
          resultDiv.textContent = '导出功能测试成功！';
          URL.revokeObjectURL(url);
        } else {
          resultDiv.className = 'test-result error';
          resultDiv.textContent = '导出功能测试失败';
        }
      } catch (e) {
        resultDiv.className = 'test-result error';
        resultDiv.textContent = '测试失败: ' + e.message;
      }
    }

    // 页面加载时加载SDK
    document.addEventListener('DOMContentLoaded', loadSDK);
  </script>
</body>
</html>
